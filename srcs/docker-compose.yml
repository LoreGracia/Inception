services:
  mariadb:
    container_name: mariadb
    image: mariadb:alpine3.22
    build: ./requirements/mariadb
    volumes:
     - mariadb_data:/var/lib/mysql
    networks:
     - inception
    env_file:
     - .env
    secrets:
     - db_password
     - db_root_password
    restart: always
  wordpress:
    container_name: wordpress
    image: wordpress:alpine3.22
    build: ./requirements/wordpress
    volumes:
     - wordpress_data:/var/www/html
    networks:
     - inception
    env_file:
     - .env
    secrets:
     - db_password
     - wp_admin_password
     - wp_user_password
    restart: always
  nginx:
    container_name: nginx
    image: nginx:alpine3.22
    build: ./requirements/nginx
    networks:
     - inception
    env_file:
     - .env
    ports:
      - 443:443
    restart: always

networks:
  inception:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lgracia-/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lgracia-/data/wordpress

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
