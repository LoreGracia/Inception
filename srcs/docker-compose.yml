services:
  mariadb:
    container_name: mariadb
    image: mariadb:alpine3.22
    build: ./requirements/mariadb
    volumes:
     - mariadb_data:/var/lib/mysql
    networks:
     - inception
    env_file:
     - .env
    secrets:
     - db_password
     - db_root_password
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$$(cat /run/secrets/db_root_password)"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always
  wordpress:
    container_name: wordpress
    image: wordpress:alpine3.22
    build: ./requirements/wordpress
    volumes:
     - wordpress_data:/var/www/html
    networks:
     - inception
    env_file:
     - .env
    secrets:
     - db_password
     - wp_admin_password
     - wp_user_password
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cgi-fcgi", "-bind", "-connect", "localhost:9000"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always
  nginx:
    container_name: nginx
    image: nginx:alpine3.22
    build: ./requirements/nginx
    networks:
     - inception
    env_file:
     - .env
    ports:
      - 443:443
    depends_on:
      wordpress:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

networks:
  inception:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lgracia-/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/lgracia-/data/wordpress

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
